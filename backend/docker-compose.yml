version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AI_SERVICE_URL=http://ai-service:8000
      - AI_SERVICE_TIMEOUT=120000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:4000
      - RATE_LIMIT_TTL=60000
      - RATE_LIMIT_LIMIT=100
    depends_on:
      - ai-service
    networks:
      - memora-network
    restart: unless-stopped

networks:
  memora-network:
    driver: bridge